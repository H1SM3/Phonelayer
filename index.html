<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLayer | Сравнение</title>
    <style>
        :root {
            --bg: #050810;
            --accent: #38bdf8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-secondary: #94a3b8;
            --success: #22c55e;
        }

        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { padding: 40px 20px; text-align: center; width: 100%; }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-container { width: 95%; max-width: 1300px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; padding: 20px; padding-bottom: 150px; }
        
        .card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 20px; transition: 0.4s; position: relative; }
        .card:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.06); }
        
        .img-box { width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .compare-btn {
            width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--accent);
            background: transparent; color: var(--accent); cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .compare-btn.active { background: var(--accent); color: black; }

        /* ПАНЕЛЬ СНИЗУ */
        .compare-bar {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: #0ea5e9; color: white;
            padding: 15px 25px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; transition: 0.5s; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .compare-bar.show { bottom: 30px; }
        .go-btn { background: white; color: #0ea5e9; border: none; padding: 8px 20px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        /* ТАБЛИЦА СРАВНЕНИЯ */
        .compare-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050810; z-index: 3000; overflow-y: auto; padding: 40px 20px; }
        .compare-table { width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; }
        .compare-table th, .compare-table td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .compare-table th { font-size: 1.2rem; color: var(--accent); }
        .param-name { text-align: left !important; color: var(--text-secondary); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .close-compare { position: fixed; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>PhoneLayer</h1>
    <p style="color: var(--text-secondary)">Выберите устройства для сравнения</p>
</header>

<div class="main-container" id="phoneGrid">
    <div class="card" data-id="1" data-name="iPhone 16 Pro Max" data-price="$1199" data-cpu="A18 Pro" data-screen="6.9'' OLED" data-batt="4685 мАч">
        <div class="img-box"><img src="images/iphone.png"></div>
        <h3 align="center">iPhone 16 Pro Max</h3>
        <button class="compare-btn" onclick="toggleCompare(this, '1')">+ Сравнить</button>
    </div>

    <div class="card" data-id="2" data-name="Honor Magic V3" data-price="$1350" data-cpu="SD 8 Gen 3" data-screen="7.92'' Fold" data-batt="5150 мАч">
        <div class="img-box"><img src="images/honor.png"></div>
        <h3 align="center">Honor Magic V3</h3>
        <button class="compare-btn" onclick="toggleCompare(this, '2')">+ Сравнить</button>
    </div>

    <div class="card" data-id="3" data-name="Galaxy S24 Ultra" data-price="$1050" data-cpu="SD 8 Gen 3" data-screen="6.8'' AMOLED" data-batt="5000 мАч">
        <div class="img-box"><img src="images/samsung.png"></div>
        <h3 align="center">Galaxy S24 Ultra</h3>
        <button class="compare-btn" onclick="toggleCompare(this, '3')">+ Сравнить</button>
    </div>
</div>

<div class="compare-bar" id="compareBar">
    <span id="compareCount">Выбрано: 0</span>
    <button class="go-btn" onclick="openCompare()">СРАВНИТЬ СЕЙЧАС</button>
</div>

<div class="compare-modal" id="compareModal">
    <span class="close-compare" onclick="closeCompare()">&times;</span>
    <h2 align="center">Сравнение характеристик</h2>
    <table class="compare-table" id="compareTable">
        </table>
</div>

<script>
    let compareList = [];

    function toggleCompare(btn, id) {
        const card = btn.parentElement;
        const phone = {
            id: id,
            name: card.dataset.name,
            price: card.dataset.price,
            cpu: card.dataset.cpu,
            screen: card.dataset.screen,
            batt: card.dataset.batt
        };

        const index = compareList.findIndex(p => p.id === id);
        if (index > -1) {
            compareList.splice(index, 1);
            btn.classList.remove('active');
            btn.innerText = '+ Сравнить';
        } else {
            if (compareList.length < 3) {
                compareList.push(phone);
                btn.classList.add('active');
                btn.innerText = 'В сравнении';
            } else {
                alert('Можно сравнить не более 3-х устройств!');
            }
        }

        const bar = document.getElementById('compareBar');
        document.getElementById('compareCount').innerText = `Выбрано: ${compareList.length}`;
        compareList.length > 0 ? bar.classList.add('show') : bar.classList.remove('show');
    }

    function openCompare() {
        const table = document.getElementById('compareTable');
        let html = `<tr><th class="param-name">Параметр</th>`;
        
        compareList.forEach(p => { html += `<th>${p.name}</th>`; });
        html += `</tr>`;

        const params = [
            ['Цена', 'price'],
            ['Процессор', 'cpu'],
            ['Экран', 'screen'],
            ['Батарея', 'batt']
        ];

        params.forEach(param => {
            html += `<tr><td class="param-name">${param[0]}</td>`;
            compareList.forEach(p => {
                html += `<td>${p[param[1]]}</td>`;
            });
            html += `</tr>`;
        });

        table.innerHTML = html;
        document.getElementById('compareModal').style.display = 'block';
    }

    function closeCompare() { document.getElementById('compareModal').style.display = 'none'; }
</script>

</body>
</html>
