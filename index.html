<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLayer | Mobile Edition</title>
    <style>
        :root {
            --bg: #050810;
            --accent: #38bdf8;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-sec: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header { padding: 30px 0; text-align: center; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ФОРМАТ SUBWAY SURFERS (Вертикальная узкая лента) */
        .main-container {
            width: 100%;
            max-width: 400px; /* Узкий экран */
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            padding-bottom: 120px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }

        .img-box { width: 140px; height: 140px; margin-bottom: 15px; cursor: pointer; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .price { color: #22c55e; font-size: 1.4rem; font-weight: bold; margin: 5px 0; }
        
        .btns-row { display: flex; gap: 10px; width: 100%; margin-top: 15px; }
        
        .btn {
            flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-info { background: var(--accent); color: black; }
        .btn-comp { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-comp.active { background: #eab308; color: black; border-color: #eab308; }

        /* МОДАЛКА С ИНФОЙ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #0f172a; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; margin: auto; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; }

        .spec-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .spec-label { color: var(--text-sec); }

        /* СИСТЕМА СРАВНЕНИЯ */
        .compare-bar { position: fixed; bottom: 20px; width: 90%; max-width: 360px; background: #0ea5e9; padding: 15px; border-radius: 20px; display: none; justify-content: space-between; align-items: center; z-index: 3000; }
        .compare-table-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050810; z-index: 4000; overflow-x: auto; padding: 20px; }
        table { border-collapse: collapse; min-width: 600px; margin-top: 50px; }
        th, td { padding: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>PhoneLayer</h1>
</header>

<div class="main-container">
    <div class="card" id="card-iphone" 
        data-name="iPhone 16 Pro Max" data-price="$1199" data-cpu="A18 Pro" data-os="iOS 18" 
        data-ram="8GB" data-rom="256GB/512GB/1TB" data-cam="48+48+12 MP" data-batt="4685 mAh">
        <div class="img-box" onclick="showInfo('card-iphone')"><img src="images/iphone.png"></div>
        <h3>iPhone 16 Pro Max</h3>
        <div class="price">$1199</div>
        <div class="btns-row">
            <button class="btn btn-info" onclick="showInfo('card-iphone')">ИНФО</button>
            <button class="btn btn-comp" onclick="toggleCompare(this, 'card-iphone')">+ СРАВНИТЬ</button>
        </div>
    </div>

    <div class="card" id="card-honor" 
        data-name="Honor Magic V3" data-price="$1350" data-cpu="Snapdragon 8 Gen 3" data-os="MagicOS 8" 
        data-ram="12/16GB" data-rom="512GB/1TB" data-cam="50+50+40 MP" data-batt="5150 mAh">
        <div class="img-box" onclick="showInfo('card-honor')"><img src="images/honor.png"></div>
        <h3>Honor Magic V3</h3>
        <div class="price">$1350</div>
        <div class="btns-row">
            <button class="btn btn-info" onclick="showInfo('card-honor')">ИНФО</button>
            <button class="btn btn-comp" onclick="toggleCompare(this, 'card-honor')">+ СРАВНИТЬ</button>
        </div>
    </div>

    <div class="card" id="card-samsung" 
        data-name="Galaxy S24 Ultra" data-price="$1050" data-cpu="SD 8 Gen 3" data-os="One UI 6.1" 
        data-ram="12GB" data-rom="256GB/512GB/1TB" data-cam="200+50+12+10 MP" data-batt="5000 mAh">
        <div class="img-box" onclick="showInfo('card-samsung')"><img src="images/samsung.png"></div>
        <h3>Galaxy S24 Ultra</h3>
        <div class="price">$1050</div>
        <div class="btns-row">
            <button class="btn btn-info" onclick="showInfo('card-samsung')">ИНФО</button>
            <button class="btn btn-comp" onclick="toggleCompare(this, 'card-samsung')">+ СРАВНИТЬ</button>
        </div>
    </div>
</div>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="mName" style="color:var(--accent)"></h2>
        <div id="mSpecs"></div>
    </div>
</div>

<div class="compare-bar" id="compBar">
    <span id="compTxt">Выбрано: 0</span>
    <button onclick="renderCompare()" style="padding: 10px; border-radius: 10px; border:none; font-weight:bold; cursor:pointer">СРАВНИТЬ</button>
</div>

<div class="compare-table-ui" id="compTableUI">
    <span class="close" onclick="document.getElementById('compTableUI').style.display='none'">&times;</span>
    <h2 align="center">Сравнение</h2>
    <div id="tableContent"></div>
</div>

<script>
    let compareList = [];

    function showInfo(id) {
        const d = document.getElementById(id).dataset;
        document.getElementById('mName').innerText = d.name;
        document.getElementById('mSpecs').innerHTML = `
            <div class="spec-item"><span class="spec-label">Процессор:</span><span>${d.cpu}</span></div>
            <div class="spec-item"><span class="spec-label">Система:</span><span>${d.os}</span></div>
            <div class="spec-item"><span class="spec-label">Память (RAM):</span><span>${d.ram}</span></div>
            <div class="spec-item"><span class="spec-label">Накопитель:</span><span>${d.rom}</span></div>
            <div class="spec-item"><span class="spec-label">Камеры:</span><span>${d.cam}</span></div>
            <div class="spec-item"><span class="spec-label">Батарея:</span><span>${d.batt}</span></div>
        `;
        document.getElementById('infoModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

    function toggleCompare(btn, id) {
        const index = compareList.indexOf(id);
        if (index > -1) {
            compareList.splice(index, 1);
            btn.classList.remove('active');
            btn.innerText = '+ СРАВНИТЬ';
        } else {
            if (compareList.length < 3) {
                compareList.push(id);
                btn.classList.add('active');
                btn.innerText = 'В СПИСКЕ';
            }
        }
        const bar = document.getElementById('compBar');
        document.getElementById('compTxt').innerText = `Выбрано: ${compareList.length}`;
        bar.style.display = compareList.length > 0 ? 'flex' : 'none';
    }

    function renderCompare() {
        let html = `<table><tr><th>Параметр</th>`;
        compareList.forEach(id => {
            html += `<th>${document.getElementById(id).dataset.name}</th>`;
        });
        html += `</tr>`;
        
        const rows = [['Цена','price'],['ЦПУ','cpu'],['ОС','os'],['RAM','ram'],['ROM','rom'],['Камеры','cam'],['АКБ','batt']];
        rows.forEach(row => {
            html += `<tr><td><b>${row[0]}</b></td>`;
            compareList.forEach(id => {
                html += `<td>${document.getElementById(id).dataset[row[1]]}</td>`;
            });
            html += `</tr>`;
        });
        html += `</table>`;
        document.getElementById('tableContent').innerHTML = html;
        document.getElementById('compTableUI').style.display = 'block';
    }
</script>
</body>
</html>
