<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLayer | Premium Database</title>
    <style>
        :root {
            --bg: #050810;
            --accent: #38bdf8;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.1), transparent 80%);
            width: 100%;
        }

        h1 { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            margin: 0; 
            background: linear-gradient(to right, #60a5fa, #a855f7); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900;
        }

        /* ГРИД-СИСТЕМА (Ландшафтный вид) */
        .main-container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            padding-bottom: 100px;
        }

        .section-title {
            grid-column: 1 / -1;
            font-size: 1.8rem;
            margin-top: 40px;
            padding-left: 15px;
            border-left: 4px solid var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: scale(1.03) translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
        }

        /* ТВОЯ АНИМАЦИЯ КАРТИНКИ */
        .img-box {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: 0.5s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .card:hover img {
            transform: scale(1.3) rotate(-5deg);
        }

        .info h3 { margin: 0 0 8px 0; font-size: 1.4rem; }
        .info p { margin: 4px 0; color: #94a3b8; font-size: 0.9rem; }
        
        .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: bold;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
        }

        @media (max-width: 600px) {
            .main-container { grid-template-columns: 1fr; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>PhoneLayer</h1>
    <p style="opacity: 0.5;">DATABASE OF THE FUTURE</p>
</header>

<div class="main-container">
    
    <div class="section-title">Apple</div>
    <div class="card">
        <div class="img-box">
            <img src="images/iphone.png" alt="iPhone 16">
        </div>
        <div class="info">
            <h3>iPhone 16 Pro Max</h3>
            <p>Чип: A18 Pro</p>
            <p>Экран: 6.9" ProMotion</p>
            <div class="badge">iOS 18</div>
        </div>
    </div>

    <div class="section-title" style="border-color: #a855f7;">Honor</div>
    <div class="card">
        <div class="img-box">
            <img src="images/honor.png" alt="Honor Magic">
        </div>
        <div class="info">
            <h3>Honor Magic V3</h3>
            <p>Толщина: 9.2 мм</p>
            <p>Тип: Складной</p>
            <div class="badge" style="color: #a855f7; background: rgba(168, 85, 247, 0.1);">MagicOS</div>
        </div>
    </div>

    <div class="section-title" style="border-color: #fbbf24;">Samsung</div>
    <div class="card">
        <div class="img-box">
            <img src="images/samsung.png" alt="Samsung S24">
        </div>
        <div class="info">
            <h3>Galaxy S24 Ultra</h3>
            <p>Камера: 200 Мп</p>
            <p>Особенность: S-Pen</p>
            <div class="badge" style="color: #fbbf24; background: rgba(251, 191, 36, 0.1);">Galaxy AI</div>
        </div>
    </div>

</div>

</body>
</html>
