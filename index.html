<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLayer | Разделы</title>
    <style>
        body {
            background-color: #030712;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 3rem; background: linear-gradient(to right, #38bdf8, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .brand-section { width: 100%; max-width: 800px; margin-bottom: 50px; }
        .section-title { font-size: 1.5rem; border-left: 5px solid #007aff; padding-left: 15px; margin-bottom: 20px; }
        .honor-title { border-color: #a855f7; }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }
        
        .img-box { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 100%; transition: 0.5s; }
        .card:hover img { transform: scale(1.3); } /* Твоя анимка */

        .info h3 { margin: 0 0 5px 0; }
        .info p { margin: 0; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>PhoneLayer</h1>
    <p>Энциклопедия по разделам</p>
</header>

<div class="brand-section">
    <div class="section-title">Apple</div>
    <div class="card">
        <div class="img-box">
            <img src="https://support.apple.com/library/APPLE/APPLECARE_ALLGEOS/SP893/iphone-15-pro-max-colors.png" alt="iPhone">
        </div>
        <div class="info">
            <h3>iPhone 16 Pro Max</h3>
            <p>Чип: A18 Pro | Экран: 6.9"</p>
        </div>
    </div>
</div>

<div class="brand-section">
    <div class="section-title honor-title">Honor</div>
    <div class="card">
        <div class="img-box">
            <img src="https://pms-global.pccw.com/m/resource/file/5b958e0a-5c3b-4176-88c9-0a67137b00ca/large/HONOR_Magic_V3_Orange_03.webp" alt="Honor">
        </div>
        <div class="info">
            <h3>Magic V3</h3>
            <p>Толщина: 9.2 мм | Складной</p>
        </div>
    </div>
</div>

</body>
</html>
