<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLayer | Mobile Database</title>
    <style>
        :root {
            --bg: #050810;
            --accent: #38bdf8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-sec: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header { padding: 40px 0; text-align: center; width: 100%; }
        h1 { 
            font-size: 3rem; margin: 0; 
            background: linear-gradient(to right, #60a5fa, #a855f7); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* ТВОЯ ЛЕНТА */
        .main-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 20px;
            padding-bottom: 120px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .img-box {
            width: 180px; height: 180px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px;
        }

        .img-box img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            transition: 0.5s ease;
        }

        .card:hover img { transform: scale(1.15) rotate(-3deg); }

        h3 { margin: 10px 0; font-size: 1.6rem; }
        .price { color: #22c55e; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }

        /* КНОПКИ */
        .btns-group { display: flex; gap: 10px; width: 100%; }
        .btn {
            flex: 1; padding: 14px; border-radius: 18px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-info { background: var(--accent); color: #000; }
        .btn-comp { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-comp.active { background: #facc15; color: #000; }

        /* МОДАЛКИ (Изначально скрыты!) */
        .modal {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }

        .modal-content {
            background: #0f172a; padding: 30px; border-radius: 35px;
            width: 100%; max-width: 360px; position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; }

        .spec-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .label { color: var(--text-sec); font-size: 0.8rem; }

        /* НИЖНИЙ БАР СРАВНЕНИЯ */
        .compare-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #0ea5e9; width: 85%; max-width: 350px;
            padding: 15px 20px; border-radius: 20px;
            display: none; justify-content: space-between; align-items: center;
            z-index: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ТАБЛИЦА СРАВНЕНИЯ */
        #compareScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; overflow: auto; padding: 40px 10px;
        }
        table { border-collapse: collapse; width: 100%; min-width: 500px; margin-top: 30px; }
        th, td { padding: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>PhoneLayer</h1>
</header>

<div class="main-container">
    <div class="card" id="p1" data-name="iPhone 16 Pro Max" data-price="$1199" data-cpu="A18 Pro" data-os="iOS 18" data-ram="8GB" data-batt="4685 mAh">
        <div class="img-box"><img src="images/iphone.png"></div>
        <h3>iPhone 16 Pro Max</h3>
        <div class="price">$1199</div>
        <div class="btns-group">
            <button class="btn btn-info" onclick="openInfo('p1')">ИНФО</button>
            <button class="btn btn-comp" onclick="addToCompare(this, 'p1')">+ СРАВНИТЬ</button>
        </div>
    </div>

    <div class="card" id="p2" data-name="Honor Magic V3" data-price="$1350" data-cpu="SD 8 Gen 3" data-os="MagicOS 8" data-ram="12/16GB" data-batt="5150 mAh">
        <div class="img-box"><img src="images/honor.png"></div>
        <h3>Honor Magic V3</h3>
        <div class="price">$1350</div>
        <div class="btns-group">
            <button class="btn btn-info" onclick="openInfo('p2')">ИНФО</button>
            <button class="btn btn-comp" onclick="addToCompare(this, 'p2')">+ СРАВНИТЬ</button>
        </div>
    </div>

    <div class="card" id="p3" data-name="Galaxy S24 Ultra" data-price="$1050" data-cpu="SD 8 Gen 3" data-os="One UI 6.1" data-ram="12GB" data-batt="5000 mAh">
        <div class="img-box"><img src="images/samsung.png"></div>
        <h3>Galaxy S24 Ultra</h3>
        <div class="price">$1050</div>
        <div class="btns-group">
            <button class="btn btn-info" onclick="openInfo('p3')">ИНФО</button>
            <button class="btn btn-comp" onclick="addToCompare(this, 'p3')">+ СРАВНИТЬ</button>
        </div>
    </div>
</div>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="mTitle" style="color:var(--accent)"></h2>
        <div id="mBody"></div>
    </div>
</div>

<div class="compare-bar" id="compBar">
    <span id="compCount">Выбрано: 0</span>
    <button onclick="showCompareTable()" style="padding: 8px 15px; border-radius: 10px; border:none; font-weight:bold;">СРАВНИТЬ</button>
</div>

<div id="compareScreen">
    <span class="close" onclick="this.parentElement.style.display='none'">&times;</span>
    <h2 align="center">Сравнение</h2>
    <div id="tablePlace" style="overflow-x: auto;"></div>
</div>

<script>
    let compareList = [];

    function openInfo(id) {
        const d = document.getElementById(id).dataset;
        document.getElementById('mTitle').innerText = d.name;
        document.getElementById('mBody').innerHTML = `
            <div class="spec-row"><span class="label">Процессор</span><span>${d.cpu}</span></div>
            <div class="spec-row"><span class="label">Система</span><span>${d.os}</span></div>
            <div class="spec-row"><span class="label">RAM</span><span>${d.ram}</span></div>
            <div class="spec-row"><span class="label">Батарея</span><span>${d.batt}</span></div>
            <div class="spec-row" style="border:none"><span class="label">Цена</span><span style="color:#22c55e">${d.price}</span></div>
        `;
        document.getElementById('infoModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

    function addToCompare(btn, id) {
        const idx = compareList.indexOf(id);
        if (idx > -1) {
            compareList.splice(idx, 1);
            btn.classList.remove('active');
            btn.innerText = '+ СРАВНИТЬ';
        } else {
            if (compareList.length < 3) {
                compareList.push(id);
                btn.classList.add('active');
                btn.innerText = 'В СПИСКЕ';
            }
        }
        document.getElementById('compCount').innerText = `Выбрано: ${compareList.length}`;
        document.getElementById('compBar').style.display = compareList.length > 0 ? 'flex' : 'none';
    }

    function showCompareTable() {
        let html = `<table><tr><th>Параметр</th>`;
        compareList.forEach(id => html += `<th>${document.getElementById(id).dataset.name}</th>`);
        html += `</tr>`;
        const rows = [['Процессор','cpu'],['ОС','os'],['RAM','ram'],['АКБ','batt'],['Цена','price']];
        rows.forEach(r => {
            html += `<tr><td><b>${r[0]}</b></td>`;
            compareList.forEach(id => html += `<td>${document.getElementById(id).dataset[r[1]]}</td>`);
            html += `</tr>`;
        });
        html += `</table>`;
        document.getElementById('tablePlace').innerHTML = html;
        document.getElementById('compareScreen').style.display = 'block';
    }
</script>
</body>
</html>
