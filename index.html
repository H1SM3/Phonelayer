<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneLayer | Landscape Design</title>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --apple-clr: #007aff;
            --honor-clr: #a855f7;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 80px 0;
            text-align: center;
            background: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.1), transparent 70%);
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            margin: 0;
            background: linear-gradient(90deg, #fff, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* КОНТЕЙНЕР ДЛЯ ЛАНДШАФТНОГО ВИДА */
        .main-content {
            width: 95%;
            max-width: 1400px;
            padding: 20px;
        }

        .section-group {
            margin-bottom: 60px;
        }

        .brand-header {
            font-size: 2rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-header::after {
            content: '';
            height: 2px;
            flex-grow: 1;
            background: linear-gradient(to right, currentColor, transparent);
            opacity: 0.3;
        }

        /* СЕТКА: Позволяет карточкам вставать в ряд */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
        }

        /* АНИМАЦИЯ ФОТО */
        .image-wrapper {
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .image-wrapper img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.6s ease;
            /* Если картинка не грузится, покажет этот текст */
            color: #475569;
            font-size: 0.8rem;
        }

        .card:hover .image-wrapper img {
            transform: scale(1.25) rotate(-3deg); /* Увеличение + легкий наклон */
        }

        .info h3 { font-size: 1.8rem; margin: 0 0 10px 0; }
        .specs { color: #94a3b8; font-size: 1rem; line-height: 1.6; }
        .specs span { color: white; font-weight: 600; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; } /* На совсем мелких экранах всё же в одну колонку */
        }
    </style>
</head>
<body>

<header>
    <h1>PhoneLayer</h1>
    <p style="letter-spacing: 5px; text-transform: uppercase; opacity: 0.6;">The Mobile Archive</p>
</header>

<div class="main-content">
    
    <div class="section-group" style="color: var(--apple-clr);">
        <div class="brand-header">Apple Experience</div>
        <div class="grid">
            <div class="card">
                <div class="image-wrapper">
                    <img src="https://v-p-s.kz/upload/iblock/88b/88b86895318612ca49377df480746098.png" alt="iPhone 16 Pro Max">
                </div>
                <div class="info">
                    <h3 style="color: white;">iPhone 16 Pro Max</h3>
                    <div class="specs">
                        Процессор: <span>A18 Pro</span><br>
                        Дисплей: <span>6.9" ProMotion</span>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="image-wrapper">
                    <img src="https://v-p-s.kz/upload/iblock/c3a/c3a44011e403d98c199587422002f23b.png" alt="iPhone 16">
                </div>
                <div class="info">
                    <h3 style="color: white;">iPhone 16</h3>
                    <div class="specs">
                        Процессор: <span>A18</span><br>
                        Камера: <span>Fusion 48MP</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="section-group" style="color: var(--honor-clr);">
        <div class="brand-header">Honor Innovation</div>
        <div class="grid">
            <div class="card">
                <div class="image-wrapper">
                    <img src="https://consumer.honor.com/content/dam/honor/global/product-list/smartphone/honor-magic-v3/magic-v3-list-redwood.png" alt="Honor Magic V3">
                </div>
                <div class="info">
                    <h3 style="color: white;">Honor Magic V3</h3>
                    <div class="specs">
                        Тип: <span>Foldable</span><br>
                        Толщина: <span>9.2 мм</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
